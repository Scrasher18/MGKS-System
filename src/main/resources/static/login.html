<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGKS - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .login-card { width: 400px; border-top: 5px solid #0d6efd; }
    </style>
</head>
<body>
    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="card shadow login-card p-4">
            <div class="text-center mb-4">
                <h2 class="fw-bold">MGKS SAC</h2>
                <p class="text-muted">Sistema Industrial</p>
            </div>
            <form>
                <div class="mb-3">
                    <label for="dni" class="form-label">DNI de Usuario</label>
                    <input type="text" id="dni" class="form-control" placeholder="Ingrese su DNI" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="********" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Ingresar</button>
            </form>
            <div class="mt-4 text-center">
                <p class="small">¿No tienes una cuenta? <a href="registro.html" class="text-decoration-none">Regístrate aquí</a></p>
            </div>
        </div>
    </div>
</body>
</html>
